services:
  mysql:
    image: mariadb:10.11
    container_name: medinexplus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medinexplus}
      MYSQL_USER: ${MYSQL_USER:-medinex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medinexpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      provenance: false
      sbom: false
    container_name: medinexplus-db-init
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-medinex}:${MYSQL_PASSWORD:-medinexpassword}@mysql:3306/${MYSQL_DATABASE:-medinexplus}
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: medinexplus
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-medinex}:${MYSQL_PASSWORD:-medinexpassword}@mysql:3306/${MYSQL_DATABASE:-medinexplus}
    depends_on:
      db-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
