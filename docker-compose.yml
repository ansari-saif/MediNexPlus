services:
  mysql:
    image: mysql:8.0
    container_name: medinexplus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medinexplus}
      MYSQL_USER: ${MYSQL_USER:-medinex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medinexpassword}
    # Internal Docker network only — not exposed to the internet.
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      provenance: false
      sbom: false
    container_name: medinexplus-db-init
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-medinex}:${MYSQL_PASSWORD:-medinexpassword}@mysql:3306/${MYSQL_DATABASE:-medinexplus}
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: medinexplus
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-medinex}:${MYSQL_PASSWORD:-medinexpassword}@mysql:3306/${MYSQL_DATABASE:-medinexplus}
      OTEL_ENABLED: ${OTEL_ENABLED:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-medinexplus-web}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.2}
      PYROSCOPE_SERVER_ADDRESS: ${PYROSCOPE_SERVER_ADDRESS:-http://pyroscope:4040}
      PYROSCOPE_APPLICATION_NAME: ${PYROSCOPE_APPLICATION_NAME:-medinexplus-web}
    depends_on:
      db-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  alloy:
    image: grafana/alloy:latest
    container_name: medinexplus-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
      - tempo
      - prometheus
    profiles:
      - observability

  loki:
    image: grafana/loki:3.4.2
    container_name: medinexplus-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    profiles:
      - observability

  tempo:
    image: grafana/tempo:2.7.1
    container_name: medinexplus-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yaml
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_data:/var/tempo
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: medinexplus-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - observability

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: medinexplus-pyroscope
    restart: unless-stopped
    volumes:
      - pyroscope_data:/data
    profiles:
      - observability

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    container_name: medinexplus-mysqld-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${MYSQL_USER:-medinex}:${MYSQL_PASSWORD:-medinexpassword}@(mysql:3306)/
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: medinexplus-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-pyroscope-datasource
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
      - pyroscope
    profiles:
      - observability

volumes:
  mysql_data:
  loki_data:
  tempo_data:
  prometheus_data:
  pyroscope_data:
  grafana_data:
